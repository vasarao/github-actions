name: Node CI

on:
  push:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install
        run: npm install

      - name: Test
        run: npm test
