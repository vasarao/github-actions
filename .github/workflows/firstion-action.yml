name: Python CI Advanced

on: [push]

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - run: pip install flake8 pytest

      - name: Lint
        run: flake8 .

      - name: Test
        run: pytest
